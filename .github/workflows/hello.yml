name : Hello                       # ワークフロー名
on: push                           # イベント(プッシュ時に実行)
jobs:                              # ジョブ定義
  hello:                           # ジョブID
    runs-on: ubuntu-latest         # ランナー（ubuntuで実行)
    steps:                         # ステップ定義
       - run : echo "Hello, World" # シェルコマンド実行
       - uses: actions/checkout@v4  # アクションの呼び出し